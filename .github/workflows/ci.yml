name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run verify
      - run: npm run smoke:electron
      - run: npm run smoke:app
      - run: npm run build:dir
