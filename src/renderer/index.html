<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'" />
    <title>Codex 工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app">
      <section id="orb" class="orb" aria-label="Codex 工具悬浮球">
        <div class="ring">
          <div id="ringFill" class="ring-fill"></div>
          <div class="orb-core">
            <span id="tierText" class="tier">--</span>
            <strong id="percentText">--%</strong>
            <span id="orbCaption" class="caption">5h 剩余</span>
          </div>
        </div>
        <div id="resizeGrip" class="resize-grip" aria-hidden="true"></div>
      </section>

      <button id="scrim" class="scrim" hidden aria-label="关闭详情"></button>

      <aside id="panel" class="panel" hidden>
        <header class="panel-head">
          <div class="title-stack">
            <div class="title-row">
              <h1>Codex 工具</h1>
              <span id="lastSyncedText">--</span>
            </div>
            <div class="current-strip">
              <span class="dot"></span>
              <span id="currentAccountText">当前：--</span>
              <strong id="currentTierPill">--</strong>
            </div>
          </div>
          <div class="head-actions">
            <button id="pricingSettingsButton" class="icon-button" title="定价设置" aria-label="定价设置">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2v20"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7H14.5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </button>
            <button id="themeToggleButton" class="theme-toggle" title="切换浅色模式" aria-label="切换浅色模式">☀️</button>
            <button id="refreshButton" class="icon-button" title="刷新" aria-label="刷新">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 12a8 8 0 1 1-2.34-5.66"/><path d="M20 4v6h-6"/></svg>
            </button>
            <button id="closePanel" class="icon-button" title="收起" aria-label="收起">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
          </div>
        </header>

        <div class="panel-content">
          <section class="accounts-section">
            <div class="section-title">
              <div class="accounts-title-inline">
                <h2>账号信息</h2>
                <span>项目、任务与配置共用 · 仅切换登录认证</span>
              </div>
              <div class="account-import-actions">
                <button id="prepareAddAccountButton" class="mini-button">+ 添加账号</button>
                <button id="importAccountButton" class="mini-button">导入当前账号</button>
              </div>
            </div>
            <div id="accountFlowStatus" class="switch-status account-flow-status" hidden></div>
            <div id="accountsList" class="accounts-list"></div>
          </section>

          <section class="cards-section">
            <div class="section-title">
              <h2 id="resetCardsTitle">可用重置卡 · --</h2>
              <span id="cardCountText">0 张</span>
            </div>
            <div id="resetCards" class="card-list"></div>
          </section>

          <section class="local-section">
            <div class="section-title">
              <div class="local-title-inline">
                <h2>本地日志汇总</h2>
                <span id="localSummarySubtitle">所有会话 · 不拆分账号 · 总计 --</span>
              </div>
              <div class="segmented" role="tablist" aria-label="本地日志时间范围">
                <button data-local-range="today" class="is-active">今日</button>
                <button data-local-range="last7d">7天</button>
                <button data-local-range="last30d">30天</button>
              </div>
            </div>
            <dl class="local-grid">
              <div>
                <dt>输入</dt>
                <dd class="token-cost-value"><span id="localInputTokens">--</span><small id="localInputCost">--</small></dd>
              </div>
              <div>
                <dt>缓存输入</dt>
                <dd id="localCachedTokens">--</dd>
              </div>
              <div>
                <dt>缓存率</dt>
                <dd id="localCacheRate">--</dd>
              </div>
              <div>
                <dt>输出</dt>
                <dd class="token-cost-value"><span id="localOutputTokens">--</span><small id="localOutputCost">--</small></dd>
              </div>
            </dl>
            <p id="localTokenMeta" class="meta-line">--</p>
            <div id="localModelBreakdown" class="model-breakdown" aria-label="按模型拆分的 Token 用量"></div>
          </section>
        </div>

        <footer class="actions">
          <div class="action-group">
            <button id="aboutButton" class="text-button ghost">
              <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
              关于工具
            </button>
          </div>
          <div class="action-group action-group-right">
            <button id="openButton" class="text-button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
              打开网页
            </button>
            <button id="quitButton" class="text-button ghost">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.36 6.64a9 9 0 1 1-12.72 0"/><path d="M12 2v10"/></svg>
              退出
            </button>
          </div>
        </footer>

        <div id="confirmDialog" class="confirm-backdrop" hidden>
          <section class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
            <h2 id="confirmTitle">切换账号？</h2>
            <p id="confirmBody">项目、任务、会话与配置保持共用，只切换当前登录认证。</p>
            <div id="confirmStatus" class="switch-status" hidden></div>
            <div class="confirm-actions">
              <button id="cancelSwitchButton" class="text-button ghost">取消</button>
              <button id="manualSwitchButton" class="text-button ghost">手动切换</button>
              <button id="autoSwitchButton" class="text-button">自动切换</button>
            </div>
          </section>
        </div>

        <div id="pricingDialog" class="confirm-backdrop" hidden>
          <section class="confirm-card pricing-card" role="dialog" aria-modal="true" aria-labelledby="pricingTitle">
            <h2 id="pricingTitle">定价设置</h2>
            <p>美元 / 100万 Token。每种模型独立估算，官方价格变化时可在这里调整。</p>
            <div class="pricing-form">
              <label class="price-field price-model-field">
                <span>模型</span>
                <select id="pricingModelSelect"></select>
              </label>
              <label class="price-field">
                <span>输入</span>
                <input id="inputPriceField" type="number" min="0" step="0.0001" inputmode="decimal" />
              </label>
              <label class="price-field">
                <span>缓存输入</span>
                <input id="cachedInputPriceField" type="number" min="0" step="0.0001" inputmode="decimal" />
              </label>
              <label class="price-field">
                <span>输出</span>
                <input id="outputPriceField" type="number" min="0" step="0.0001" inputmode="decimal" />
              </label>
            </div>
            <div id="pricingStatus" class="switch-status" hidden></div>
            <div class="confirm-actions">
              <button id="cancelPricingButton" class="text-button ghost">取消</button>
              <button id="resetPricingButton" class="text-button ghost">恢复默认</button>
              <button id="savePricingButton" class="text-button">保存</button>
            </div>
          </section>
        </div>
      </aside>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
